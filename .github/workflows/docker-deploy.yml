name: Build and Push to Artifact Registry

on:
  push:
    branches: [master, "2026-06-07-docker-deploy"]

env:
  REGION: us-central1
  IMAGE: mcp-medical-price-transparency

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute version tag
        id: version
        run: |
          if DESCRIBED=$(git describe --tags --long 2>/dev/null); then
            BASE_TAG=$(echo "$DESCRIBED" | sed 's/-[0-9]*-g[0-9a-f]*$//')
            COMMITS=$(echo "$DESCRIBED" | sed 's/.*-\([0-9]*\)-g[0-9a-f]*$/\1/')
            SHA=$(echo "$DESCRIBED" | sed 's/.*-g//')
            if [ "$COMMITS" = "0" ]; then
              VERSION="${BASE_TAG}"
            else
              VERSION="${BASE_TAG}-${COMMITS}-${SHA}-SNAPSHOT"
            fi
          else
            COMMITS=$(git rev-list --count HEAD)
            SHA=$(git rev-parse --short HEAD)
            VERSION="0.0.0-${COMMITS}-${SHA}-SNAPSHOT"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.auth_token }}

      - name: Build and push
        run: |
          IMAGE_URI="${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/${{ env.IMAGE }}"
          docker build \
            -t "${IMAGE_URI}:${{ steps.version.outputs.version }}" \
            -t "${IMAGE_URI}:latest" \
            .
          docker push "${IMAGE_URI}:${{ steps.version.outputs.version }}"
          docker push "${IMAGE_URI}:latest"
