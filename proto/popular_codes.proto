syntax = "proto3";
package org.medical.price.transparency.api;
import "scalapb/scalapb.proto";
import "hospital_procedure_cost.proto";
option java_multiple_files = true;
option java_package = "org.medical.price.transparency.api";
option java_outer_classname = "PopularCodesProto";
option (scalapb.options) = {
  scala3_sources: true
};
message TopCodesRequest {
  int32 n = 1;
  // Methodology db string. Empty means all methodologies for cost enrichment.
  string methodology = 2;
  // Include per-code cost stats in the response when true.
  bool include_cost = 3;
}

message PopularCodeMessage {
  string code = 1;
  string sample_description = 2;
  string min_cost = 3;
  string max_cost = 4;
  string gross_charge = 5;
  string discounted_cash = 6;
  int32 occurrences = 7;
  string code_type = 8;
}

message PopularCodeWithCostMessage {
  PopularCodeMessage popular_code = 1;
  bool has_cost = 2;
  ProcedureCostStatsMessage cost = 3;
}

message HospitalTopCodes {
  string hospital = 1;
  repeated PopularCodeWithCostMessage codes = 2;
}

message TopCodesResponse {
  repeated PopularCodeMessage codes = 1;
}

message TopCodesByHospitalResponse {
  HospitalTopCodes mca = 1;
  HospitalTopCodes uihc = 2;
}

service PopularCodesService {
  // Backwards-compatible endpoint returning MCA top codes only.
  rpc GetTopCodes (TopCodesRequest) returns (TopCodesResponse);
  // Preferred endpoint returning top codes for both hospitals.
  rpc GetTopCodesByHospital (TopCodesRequest) returns (TopCodesByHospitalResponse);
}
