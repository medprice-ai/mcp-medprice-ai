syntax = "proto3";
package ai.medprice.api;

import "scalapb/scalapb.proto";

option java_multiple_files = true;
option java_package = "ai.medprice.api";
option java_outer_classname = "HospitalCodeCostProto";
option (scalapb.options) = {
  scala3_sources: true
};

message HospitalCodeCostRequest {
  // e.g. "MS-DRG"
  string code_type = 1;
  // e.g. "652"
  string code = 2;
  // Methodology db string, e.g. "case rate". Empty means "all methodologies".
  string methodology = 3;
}

message CodeCostStatsMessage {
  string code_type = 1;
  string code = 2;
  string min = 3;
  string max = 4;
  string avg = 5;
  string median = 6;
  string std_dev = 7;
}

message HospitalDescription {
  string hospital_name = 1;
  string location = 2;
  string code_description = 3;
  string methodology_note = 4;
}

message HospitalCostResult {
  string hospital = 1;
  bool found = 2;
  CodeCostStatsMessage cost = 3;
  HospitalDescription description = 4;
}

message HospitalCodeCostResponse {
  HospitalCostResult mca = 1;
  HospitalCostResult uihc = 2;
}

service HospitalCodeCostService {
  rpc GetHospitalCodeCost (HospitalCodeCostRequest) returns (HospitalCodeCostResponse);
}

