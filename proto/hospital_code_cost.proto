syntax = "proto3";
package ai.medprice.api;

import "scalapb/scalapb.proto";

option java_multiple_files = true;
option java_package = "ai.medprice.api";
option java_outer_classname = "HospitalCodeCostProto";
option (scalapb.options) = {
  scala3_sources: true
};

message HospitalCodeCostRequest {
  // Opaque handle from HospitalRecord.hospital_id returned by ListHospitals.
  string hospital_id = 1;
  // e.g. "MS-DRG"
  string code_type = 2;
  // e.g. "652"
  string code = 3;
  // Methodology db string, e.g. "case rate". Empty means "all methodologies".
  string methodology = 4;
}

message CodeCostStatsMessage {
  string code_type = 1;
  string code = 2;
  string min = 3;
  string max = 4;
  string avg = 5;
  string median = 6;
  string std_dev = 7;
}

message HospitalDescription {
  string hospital_name = 1;
  string location = 2;
  string code_description = 3;
  string methodology_note = 4;
}

message HospitalCostResult {
  string hospital = 1;
  // proto3 "optional" gives this scalar field explicit presence, so JSON
  // marshaling (e.g. grpcurl) always emits it, even when false.
  optional bool found = 2;
  CodeCostStatsMessage cost = 3;
  HospitalDescription description = 4;
}

service HospitalCodeCostService {
  // Returns cost stats for the single hospital identified by hospital_id.
  rpc GetHospitalCodeCost (HospitalCodeCostRequest) returns (HospitalCostResult);
}

