syntax = "proto3";
package ai.medprice.api;

import "scalapb/scalapb.proto";

option java_multiple_files = true;
option java_package = "ai.medprice.api";
option java_outer_classname = "HospitalRegistryProto";
option (scalapb.options) = {
  scala3_sources: true
};

message HospitalRecord {
  // Opaque handle backed by hospital_registry.id (DB primary key).
  string hospital_id = 1;
  // EIN — groups filings from the same legal entity (e.g. "46-4027347").
  string ein = 2;
  string hospital_name = 3;
  repeated string locations = 4;
  // ISO-8601 date (e.g. "2025-01-01") the source file was last updated on.
  string last_updated_on = 5;
}

message ListHospitalsRequest {
  // Maximum number of hospitals to return. Defaults to 20, capped at 100.
  int32 page_size = 1;
  // Opaque token returned by a previous ListHospitals call. Empty for the first page.
  string page_token = 2;
}

message ListHospitalsResponse {
  repeated HospitalRecord hospitals = 1;
  // Empty when there are no more results.
  string next_page_token = 2;
}

service HospitalRegistryService {
  rpc ListHospitals (ListHospitalsRequest) returns (ListHospitalsResponse);
}
